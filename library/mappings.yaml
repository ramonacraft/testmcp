# TestMCP Risk Mappings
# Maps code-change signals (file path globs + keywords found in paths, PR title,
# and PR body) to functional areas in the test case library. This is the heart
# of the prediction layer: edit these mappings to teach TestMCP your codebase.
#
# criticality drives the risk weighting: P0 = 4, P1 = 3, P2 = 2, P3 = 1.

areas:
  video-playback:
    description: VOD player, playback engine, ABR, DRM, player UI/controls
    criticality: P0
    file_patterns:
      - "**/player/**"
      - "**/*player*"
      - "**/video/**"
      - "**/*playback*"
      - "**/*hls*"
      # 'dash' needs segment boundaries — bare "**/*dash*" matches "dashboard".
      - "**/dash/**"
      - "**/dash[-._]*"
      - "**/*[-._]dash[-._]*"
      - "**/*drm*"
      - "**/*exoplayer*"
      - "**/*avplayer*"
    keywords: [player, playback, video, hls, dash, drm, bitrate, buffer, codec, vod]

  live-streaming:
    description: Live channels, live edge, SCTE markers, live event surfaces
    criticality: P0
    file_patterns:
      - "**/live/**"
      # 'live' and 'stream' need segment boundaries — bare "**/*live*" matches
      # "delivery", bare "**/*stream*" matches "downstream"/"upstream".
      - "**/live[-._]*"
      - "**/*[-._]live[-._]*"
      - "**/stream*"
      - "**/*[-._]stream*"
      - "**/*scte*"
      - "**/*epg*"
    keywords: [live, stream, linear, scte, epg, channel, broadcast]

  analytics:
    description: Adobe Launch/AEP, heartbeat, comScore, Nielsen, tag management, tracking
    criticality: P0
    file_patterns:
      - "**/analytics/**"
      - "**/*analytics*"
      - "**/*adobe*"
      - "**/*tracking*"
      - "**/*telemetry*"
      - "**/*heartbeat*"
      - "**/*comscore*"
      - "**/*nielsen*"
      # 'segment' as a bare glob is ambiguous in a streaming app (video segments,
      # segmented controls) — only match a dedicated segment/ directory.
      - "**/segment/**"
      - "**/*gtm*"
    # 'launch' and 'tag' alone are too common in PR prose ("launch the feature",
    # git tags) — qualified phrases only.
    keywords: [analytics, adobe, adobe launch, heartbeat, tracking, beacon, comscore, nielsen, pageview, telemetry, tag manager]

  terms-compliance:
    description: Terms of use, privacy policy, consent management (CMP), GDPR/CCPA
    criticality: P0
    file_patterns:
      - "**/*terms*"
      - "**/*privacy*"
      - "**/*consent*"
      - "**/*gdpr*"
      - "**/*ccpa*"
      - "**/*onetrust*"
      - "**/legal/**"
    keywords: [terms, privacy, consent, gdpr, ccpa, compliance, legal, cmp, onetrust]

  auth:
    description: Sign in/up, sessions, entitlement, MVPD/TV-provider auth, tokens
    criticality: P0
    file_patterns:
      - "**/auth/**"
      # Note: "**/*auth*" intentionally matches "authorization"/"authenticate",
      # but also matches "author*" files — acceptable for P0 caution, revisit if noisy.
      - "**/*auth*"
      - "**/*login*"
      - "**/*signin*"
      - "**/*signup*"
      - "**/*session*"
      - "**/*entitle*"
      - "**/*mvpd*"
      - "**/*token*"
      - "**/*oauth*"
    keywords: [auth, login, signin, signup, session, entitlement, mvpd, oauth, token, sso, password]

  navigation-routing:
    description: Routing, navigation stacks, deep links, URL handling
    criticality: P0
    file_patterns:
      - "**/navigation/**"
      - "**/routes/**"
      # "**/*rout*" matched "routine" — spell out the real variants,
      # including files nested inside route/router directories.
      - "**/*route*"
      - "**/*router*"
      - "**/*routing*"
      - "**/*route*/**"
      - "**/*routing*/**"
      - "**/*navigat*"
      - "**/*deeplink*"
      - "**/*deep-link*"
      - "**/*universal-link*"
    keywords: [route, routing, navigation, deeplink, deep link, universal link, redirect]

  app-stability:
    description: App lifecycle, startup, crash handling, core infrastructure
    criticality: P0
    file_patterns:
      - "**/App.*"
      # "**/index.*" and "**/main.*" matched every index/main file in any repo —
      # scope to src-level entry points only.
      - "src/main.*"
      - "src/index.*"
      - "app/main.*"
      - "app/index.*"
      - "**/AppDelegate.*"
      - "**/MainActivity.*"
      - "**/Application.*"
      - "**/*bootstrap*"
      - "**/*startup*"
    keywords: [launch, startup, lifecycle, crash, bootstrap, cold start]

  ads:
    description: Ad serving, pre/mid-roll, ad SDKs (IMA/FreeWheel), ad beacons
    criticality: P1
    file_patterns:
      - "**/ads/**"
      - "**/*advert*"
      # 'ad' and 'ima' need segment boundaries — bare "**/*ad-*" matched "download-*",
      # and "**/*ima*" matched "reanimated" (real false positive, facebook/react#34000).
      - "**/ad[-._]*"
      - "**/*[-._]ad[-._]*"
      - "**/*freewheel*"
      - "**/ima/**"
      - "**/ima[-._]*"
      - "**/*[-._]ima[-._]*"
      - "**/*vast*"
      - "**/*vmap*"
    keywords: [ads, advert, preroll, midroll, freewheel, ima, vast, vmap, ad break, monetization]

  search-discovery:
    description: Search, autocomplete, recommendations, browse/discovery rails
    criticality: P1
    file_patterns:
      - "**/search/**"
      - "**/*search*"
      - "**/*discover*"
      - "**/*recommend*"
      - "**/*autocomplete*"
    keywords: [search, discovery, recommendation, autocomplete, browse, rail, carousel]

  push-notifications:
    description: Push registration, providers (APNs/FCM/Airship/Braze), deep links from push
    criticality: P1
    file_patterns:
      - "**/*push*"
      - "**/*notification*"
      - "**/*apns*"
      - "**/*fcm*"
      - "**/*airship*"
      - "**/*braze*"
    keywords: [push, notification, apns, fcm, airship, braze, opt-in]

  accessibility:
    description: Captions, screen readers, focus management, a11y compliance
    criticality: P1
    file_patterns:
      - "**/*caption*"
      - "**/*subtitle*"
      - "**/*a11y*"
      - "**/*accessib*"
    keywords: [caption, subtitle, accessibility, a11y, voiceover, talkback, wcag]

  settings:
    description: User settings and preferences
    criticality: P2
    file_patterns:
      - "**/settings/**"
      - "**/*settings*"
      - "**/*preference*"
    keywords: [settings, preferences, toggle]

  content-metadata:
    description: Content feeds, metadata display, detail pages, artwork
    criticality: P2
    file_patterns:
      - "**/*metadata*"
      - "**/*content*"
      - "**/detail/**"
      - "**/*feed*"
    keywords: [metadata, feed, detail page, artwork, rating, description]

  ui-layout:
    description: Layout, styling, components, responsive design
    criticality: P2
    file_patterns:
      - "**/components/**"
      - "**/*.css"
      - "**/*.scss"
      - "**/*.less"
      - "**/styles/**"
      - "**/*layout*"
      - "**/*theme*"
    keywords: [layout, style, css, responsive, breakpoint, component, theme]

  sharing:
    description: Social sharing, OG tags, share sheets
    criticality: P2
    file_patterns:
      - "**/*share*"
      - "**/*social*"
      - "**/*og-*"
    keywords: [share, social, og tag, open graph]

  engagement:
    description: In-app messaging, banners, campaigns
    criticality: P2
    file_patterns:
      - "**/*banner*"
      - "**/*campaign*"
      - "**/*message*"
    keywords: [banner, campaign, in-app message]

  forms:
    description: Form inputs and validation
    criticality: P3
    file_patterns:
      - "**/forms/**"
      - "**/*form*"
      - "**/*validat*"
    keywords: [form, validation, input]

# Cross-cutting signals that raise overall PR risk regardless of area.
global_risk_signals:
  dependency_files:
    patterns:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"
      - "Podfile"
      - "Podfile.lock"
      - "*.gradle"
      - "*.gradle.kts"
      - "gradle.properties"
      - "Gemfile*"
      - "requirements*.txt"
      - "go.mod"
    note: Dependency changes can have wide, non-obvious blast radius — expand regression scope.
  ci_config_files:
    patterns:
      # Blanket "*.yml"/"*.yaml" counted every YAML file in the repo (fixtures,
      # configs, even TestMCP's own library) as CI config — match real CI paths only.
      - ".github/workflows/**"
      - ".circleci/**"
      - ".gitlab-ci.yml"
      - "azure-pipelines*.yml"
      - "bitrise.yml"
      - "fastlane/**"
      - "Jenkinsfile*"
      - "Dockerfile*"
      - "docker-compose*.yml"
    note: Build/CI changes can alter what actually ships — verify build artifacts and environments.
  test_file_patterns:
    patterns:
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/__tests__/**"
      - "**/test/**"
      - "**/tests/**"
      - "**/*Test.*"
      - "**/*Tests.*"
    note: Used to detect whether the PR includes test coverage for its changes.
